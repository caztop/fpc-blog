<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사진 촬영 팁</title>
<style>
  body {
    font-family: "Pretendard", sans-serif;
    background: #fdfdfd;
    padding: 40px;
    color: #333;
  }

  .box {
    max-width: 600px;
    margin: auto;
    background: #ffffff;
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    border: 1px solid #f2f2f2;
  }

  h2 {
    margin-bottom: 14px;
    font-size: 22px;
    color: #ff7f8a;
  }

  p {
    line-height: 1.7;
    font-size: 16px;
  }

  .highlight {
    background: #c9e7f5;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 600;
  }

    /* 홈으로 */
  .back-home {
    text-align: center;
    margin-top: 30px;
  }
  .back-home a {
    color: #4a3f35;
    text-decoration: none;
    font-size: 0.95rem;
    padding: 8px 14px;
    border-radius: 6px;
    background: #e8ded7;
    transition: background 0.2s ease;
  }
  .back-home a:hover {
    background: #d8c7b9;
  }
</style>
</head>
<body>

<div class="box">
  <h2>📸 사진 촬영 팁</h2>
  <p>
    사진사(찍사) 등쪽에 태양이 오게 합니다.<br>
    즉,
    <span class="highlight">태양</span> →
    <span class="highlight">사진사</span> →
    <span class="highlight">모델</span> →
    <span class="highlight">하늘</span>
    순서로 하면 파란하늘 배경의 모델을 찍을 수 있습니다.
  </p>
</div>

<div class="back-home">
  <a href="javascript:history.back()">이전 페이지로 돌아가기</a>
</div>

</body>
</html>
